<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dodgy</title>
    <style>
      :root {
        --bg: #1c1725;
        --bg-raise: #251d31;
        --fg: #f0e9f5;
        --muted: #a99bb8;
        --accent: #e0a86b;
        --accent-soft: #7c6a8f;
        --heart: #e86a7a;
        --heart-empty: #4a3f56;
        --track: #362b45;
        --danger: #d16b6b;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--fg);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }

      #app {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .name {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.5px;
        margin: 0;
      }

      .tier-badge {
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        background: rgba(224, 168, 107, 0.12);
        border: 1px solid rgba(224, 168, 107, 0.3);
        border-radius: 999px;
        padding: 2px 8px;
      }

      .spacer {
        flex: 1;
      }

      .gear {
        appearance: none;
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 17px;
        line-height: 1;
        cursor: pointer;
        padding: 6px;
        border-radius: 8px;
      }
      .gear:hover {
        color: var(--fg);
        background: var(--bg-raise);
      }
      .gear:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      .stage {
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg-raise);
        border-radius: var(--radius);
        padding: 8px 0;
      }

      canvas {
        display: block;
        width: 160px;
        height: 160px;
        image-rendering: pixelated;
      }

      .hearts {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        font-size: 16px;
        line-height: 1;
        justify-content: center;
      }
      .heart {
        color: var(--heart);
      }
      .heart.empty {
        color: var(--heart-empty);
      }
      .hp-text {
        text-align: center;
        font-size: 16px;
        font-weight: 700;
      }

      .level-line {
        font-size: 13px;
        font-weight: 600;
        text-align: center;
      }
      .level-line .sub {
        color: var(--muted);
        font-weight: 500;
      }

      .track {
        height: 6px;
        background: var(--track);
        border-radius: 999px;
        overflow: hidden;
      }
      .track > .fill {
        height: 100%;
        background: var(--accent);
        border-radius: 999px;
        width: 0;
      }

      .today {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        line-height: 1.4;
      }
      .today.done {
        color: var(--accent-soft);
      }

      .lockout {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .lockout .countdown {
        font-size: 26px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: 1px;
        color: var(--danger);
      }
      .lockout .msg {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      .fallback {
        font-size: 13px;
        color: var(--muted);
        text-align: center;
        padding: 8px;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <header>
        <h1 class="name">dodgy</h1>
        <span class="tier-badge" id="tier-badge">Tier 0</span>
        <span class="spacer"></span>
        <button class="gear" id="settings-btn" aria-label="Settings">⚙</button>
      </header>

      <div class="stage">
        <canvas id="sprite" width="160" height="160"></canvas>
      </div>

      <p class="fallback hidden" id="fallback">dodgy is waking up…</p>

      <!-- Calm view -->
      <div id="calm-view">
        <div class="hearts" id="hearts" role="img" aria-label="HP"></div>
        <div class="hp-text hidden" id="hp-text"></div>
        <div class="level-line" id="level-line" style="margin-top: 10px"></div>
        <div class="track" style="margin-top: 6px">
          <div class="fill" id="evo-fill"></div>
        </div>
        <div class="today" id="today" style="margin-top: 10px"></div>
      </div>

      <!-- Lockout view -->
      <div class="lockout hidden" id="lockout-view">
        <div class="countdown" id="countdown" aria-live="polite">00:00:00</div>
        <div class="msg" id="lockout-msg"></div>
      </div>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
