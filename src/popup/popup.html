<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dodgédex</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="shell" id="shell" data-led="green" data-mode="guardian">
      <!-- Top bar -->
      <div class="topbar">
        <div class="lens" id="lens" role="img" aria-label="Status indicator"></div>
        <div class="dot-lights" aria-hidden="true">
          <span class="r"></span><span class="y"></span><span class="g"></span>
        </div>
        <div class="title" id="title">Dodgédex</div>
        <button class="home-ball" id="home-btn" aria-label="Home (Guardian view)"></button>
      </div>

      <!-- Mode tabs -->
      <div class="mode-strip" id="mode-strip" role="tablist" aria-label="Dex modes">
        <span class="tab" role="tab" data-mode="guardian">GUARD</span>
        <span class="tab" role="tab" data-mode="party">PARTY</span>
        <span class="tab" role="tab" data-mode="shop">SHOP</span>
        <span class="tab" role="tab" data-mode="incubator">EGG</span>
      </div>

      <!-- Main screen -->
      <div class="bezel">
        <div class="screen-lights" aria-hidden="true"><span></span><span></span></div>
        <div class="screen" id="screen">
          <span class="mode-label" id="mode-label">GUARDIAN</span>
          <div id="screen-content"><!-- rendered by popup.ts --></div>
        </div>
      </div>

      <!-- Name bar -->
      <div class="name-bar">
        <span class="species" id="species-name">—</span>
        <span class="type-badges" id="type-badges"></span>
      </div>

      <!-- Green sub-screen -->
      <div class="sub-screen" id="sub-screen" aria-live="polite">Loading…</div>

      <!-- Controls -->
      <div class="controls">
        <div class="dpad" role="group" aria-label="Directional pad">
          <button class="up" id="dpad-up" aria-label="Up (previous item)">▲</button>
          <button class="left" id="dpad-left" aria-label="Left (previous mode)">◀</button>
          <span class="center" aria-hidden="true"></span>
          <button class="right" id="dpad-right" aria-label="Right (next mode)">▶</button>
          <button class="down" id="dpad-down" aria-label="Down (next item)">▼</button>
        </div>
        <button class="gear-btn" id="gear-btn" aria-label="Open settings">⚙</button>
        <div class="action-buttons">
          <button class="ab cancel" id="cancel-btn" aria-label="Cancel / back">✕</button>
          <button class="ab confirm" id="confirm-btn" aria-label="Confirm">✓</button>
        </div>
      </div>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
