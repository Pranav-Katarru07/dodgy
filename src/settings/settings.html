<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dodgy — trainer settings</title>
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        src: url('/fonts/PressStart2P-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bezel: #dedede;
        --dialog: #ffffff;
        --ink: #101010;
        --muted: #4a4a4a;
        --pokedex-red: #dc0a2d;
        --pokedex-red-dark: #a80822;
        --danger: #b3001b;
        --lcd-bg: #9bbc0f;
        --lcd-ink: #0f380f;
        --pokeball: #dc0a2d;

        --font: 'Press Start 2P', 'Courier New', monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px 14px 72px;
        font-family: var(--font);
        font-size: 9px;
        line-height: 1.9;
        letter-spacing: 0.5px;
        background: var(--bezel);
        color: var(--ink);
        image-rendering: pixelated;
      }

      #app {
        max-width: 620px;
        margin: 0 auto;
      }

      /* ---- Header ---- */
      .page-head {
        text-align: center;
        margin-bottom: 22px;
      }

      h1 {
        font-size: 14px;
        line-height: 1.6;
        letter-spacing: 1px;
        margin: 0 0 8px;
        color: var(--pokedex-red);
        text-shadow: 2px 2px 0 var(--ink);
      }

      .subtitle {
        color: var(--muted);
        font-size: 8px;
        line-height: 1.8;
        margin: 0;
      }

      h2 {
        font-size: 11px;
        line-height: 1.6;
        letter-spacing: 1px;
        margin: 0 0 16px;
        color: var(--pokedex-red);
      }

      /* ---- Dialog boxes: chunky double black borders ---- */
      section {
        background: var(--dialog);
        border: 3px solid var(--ink);
        box-shadow: 0 0 0 3px var(--dialog), 0 0 0 6px var(--ink);
        padding: 20px 18px;
        margin: 0 6px 26px;
      }

      .note {
        background: var(--lcd-bg);
        color: var(--lcd-ink);
        border: 2px solid var(--ink);
        padding: 10px 12px;
        font-size: 8px;
        line-height: 1.9;
        margin: 0 6px 24px;
      }

      /* ---- Fields ---- */
      .field {
        margin-bottom: 22px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      .field label {
        display: block;
        font-size: 9px;
        margin-bottom: 8px;
      }

      .field .explain {
        display: block;
        color: var(--muted);
        font-size: 7px;
        line-height: 2;
        margin-bottom: 10px;
      }

      input[type='number'],
      input[type='text'] {
        width: 100%;
        max-width: 220px;
        padding: 9px 10px;
        background: var(--dialog);
        color: var(--ink);
        border: 2px solid var(--ink);
        border-radius: 0;
        font-family: var(--font);
        font-size: 9px;
        line-height: 1.4;
      }

      #field-pokedexTitle,
      #add-domain-input {
        max-width: 100%;
      }

      #add-domain-input {
        flex: 1;
      }

      input:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }

      input[aria-invalid='true'] {
        border-color: var(--danger);
        box-shadow: 0 0 0 1px var(--danger) inset;
      }

      .error {
        display: none;
        color: var(--danger);
        font-size: 7px;
        line-height: 1.9;
        margin-top: 8px;
      }

      .error.visible {
        display: block;
      }

      /* ---- Buttons ---- */
      button {
        font-family: var(--font);
        font-size: 9px;
        cursor: pointer;
        border-radius: 0;
        border: 2px solid var(--ink);
        background: var(--dialog);
        color: var(--ink);
        padding: 9px 14px;
        line-height: 1.4;
      }

      button.primary {
        background: var(--pokedex-red);
        color: var(--dialog);
        border: 2px solid var(--ink);
        border-radius: 999px;
        padding: 11px 26px;
        letter-spacing: 1px;
        box-shadow: 2px 2px 0 var(--ink);
      }

      button.primary:hover:not(:disabled) {
        background: var(--pokedex-red-dark);
      }

      button.primary:active:not(:disabled) {
        transform: translate(1px, 1px);
        box-shadow: 1px 1px 0 var(--ink);
      }

      button.primary:disabled {
        background: #c9c9c9;
        color: #7a7a7a;
        box-shadow: 2px 2px 0 #7a7a7a;
        border-color: #7a7a7a;
        cursor: not-allowed;
      }

      button.link {
        background: var(--dialog);
        border: 2px solid var(--ink);
        color: var(--pokedex-red);
        padding: 8px 12px;
        font-size: 8px;
      }

      button.link:hover {
        background: #f0f0f0;
      }

      /* ---- Blocklist (collapsible) ---- */
      .blocklist-details {
        margin: 0;
      }

      .blocklist-details > summary {
        /* match the old <h2> heading look */
        font-size: 11px;
        line-height: 1.6;
        letter-spacing: 1px;
        margin: 0 0 16px;
        color: var(--pokedex-red);
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* remove the default disclosure triangle */
      .blocklist-details > summary::-webkit-details-marker {
        display: none;
      }

      /* pixel affordance: ▸ collapsed, ▾ open */
      .blocklist-details > summary::before {
        content: '\25B8';
        font-size: 11px;
        line-height: 1;
      }

      .blocklist-details[open] > summary::before {
        content: '\25BE';
      }

      .blocklist-details > summary:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }

      .blocklist {
        list-style: none;
        margin: 0 0 18px;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .blocklist li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--dialog);
        border: 2px solid var(--ink);
        padding: 8px 8px 8px 10px;
      }

      .blocklist .domain {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 8px;
        line-height: 1.6;
        word-break: break-all;
      }

      /* CSS pokeball bullet */
      .blocklist .domain::before {
        content: '';
        flex: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1.5px solid var(--ink);
        background: linear-gradient(
          to bottom,
          var(--pokeball) 0,
          var(--pokeball) 42%,
          var(--ink) 42%,
          var(--ink) 58%,
          var(--dialog) 58%,
          var(--dialog) 100%
        );
      }

      .blocklist .empty-row {
        justify-content: flex-start;
      }

      .blocklist .empty {
        color: var(--muted);
        font-size: 8px;
        font-style: normal;
      }

      .remove-btn {
        border: 2px solid var(--ink);
        background: var(--dialog);
        color: var(--danger);
        font-size: 11px;
        line-height: 1;
        padding: 4px 9px;
      }

      .remove-btn:hover {
        background: var(--danger);
        color: var(--dialog);
      }

      .add-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }

      /* ---- Save row ---- */
      .save-row {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 6px;
        flex-wrap: wrap;
      }

      #saved-region {
        background: var(--lcd-bg);
        color: var(--lcd-ink);
        border: 2px solid var(--ink);
        padding: 8px 12px;
        font-size: 8px;
        opacity: 0;
      }

      #saved-region.visible {
        opacity: 1;
      }

      @media (prefers-reduced-motion: no-preference) {
        button.primary,
        #saved-region,
        input {
          transition:
            opacity 0.2s ease,
            border-color 0.15s ease,
            background 0.15s ease,
            transform 0.05s ease;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        button.primary:active:not(:disabled) {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" hidden>
      <header class="page-head">
        <h1>TRAINER SETTINGS</h1>
        <p class="subtitle">rules your guardian lives by</p>
      </header>

      <p class="note">
        Lowering Max HP clamps every party member's HP down into range.
      </p>

      <form id="settings-form" novalidate>
        <section aria-labelledby="rules-heading">
          <h2 id="rules-heading">Rules</h2>
          <div id="fields"></div>
        </section>

        <section aria-labelledby="blocklist-heading">
          <details open class="blocklist-details">
            <summary id="blocklist-heading">Blocklist</summary>
            <ul id="blocklist" class="blocklist" aria-label="Blocked domains"></ul>

            <div class="add-row">
              <label for="add-domain-input" class="sr-only" hidden>Domain to block</label>
              <input
                type="text"
                id="add-domain-input"
                placeholder="add a site, e.g. youtube.com"
                autocomplete="off"
                aria-describedby="add-domain-error"
              />
              <button type="button" id="add-domain-btn">Add</button>
            </div>
            <p id="add-domain-error" class="error" role="alert"></p>

            <button type="button" id="reset-blocklist-btn" class="link">
              Reset to default
            </button>
          </details>
        </section>

        <div class="save-row">
          <button type="submit" id="save-btn" class="primary">Save</button>
          <span id="saved-region" aria-live="polite" role="status"></span>
        </div>
      </form>
    </main>
    <script type="module" src="./settings.ts"></script>
  </body>
</html>
